AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FindMeThis backend — single Lambda (FastAPI) + API Gateway + DynamoDB

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        AWS_REGION_NAME:       !Ref AWS::Region
        RATE_LIMIT_TABLE:      !Ref RateLimitsTable
        USER_DATA_TABLE:       !Ref UserDataTable
        OPENAI_API_KEY:        !Sub "{{resolve:ssm:/findmethis/openai_api_key}}"
        COGNITO_USER_POOL_ID:  !Sub "{{resolve:ssm:/findmethis/cognito_user_pool_id:1}}"
        COGNITO_CLIENT_ID:     !Sub "{{resolve:ssm:/findmethis/cognito_client_id:1}}"
        SAMPLES_BUCKET:        !Ref SamplesBucket

Resources:

  # ── Lambda function ─────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: FindMeThis-Api
      CodeUri: ./
      Handler: handler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RateLimitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
        - S3CrudPolicy:
            BucketName: !Ref SamplesBucket
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi

  # ── API Gateway ─────────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"
        MaxAge: 600

  # ── DynamoDB: rate limits ────────────────────────────────────────
  RateLimitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FindMeThis-RateLimits
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── DynamoDB: user data (bookmarks, favourites, history) ─────────
  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FindMeThis-UserData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── S3: sample photo storage ─────────────────────────────────────
  SamplesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "findmethis-samples-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AutoDeleteAfter5Days
            Status: Enabled
            ExpirationInDays: 5

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
